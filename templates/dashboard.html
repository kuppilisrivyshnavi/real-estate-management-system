{% extends "base.html" %}

{% block content %}

<h2>Admin Dashboard</h2>

<a href="/add" class="btn btn-success mb-3">Add Property</a>

<table class="table table-bordered">

<tr>

<th>Title</th>
<th>Location</th>
<th>Price</th>
<th>Action</th>

</tr>

{% for property in properties %}

<tr>

<td>{{property['title']}}</td>
<td>{{property['location']}}</td>
<td>{{property['price']}}</td>

<td>

<a href="/edit/{{property['id']}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{property['id']}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
